{% set name = "happybase" %}
{% set version = "1.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 43b6275d2865fc1364680a03f085491cd85d8b84db3c5aa94d25186685dfd87e

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vvv"

requirements:
  host:
    - python
    - pip
  run:
    - python
    - setuptools
    - six
    - thriftpy2

test:
  imports:
    - happybase

about:
  home: https://github.com/wbolster/happybase
  license: MIT
  license_file: LICENSE.rst
  license_family: MIT
  summary: 'A developer-friendly Python library to interact with Apache HBase'
  dev_url: https://github.com/wbolster/happybase
  doc_url: https://happybase.readthedocs.io

extra:
  recipe-maintainers:
    - pmlandwehr
    - xhochy
